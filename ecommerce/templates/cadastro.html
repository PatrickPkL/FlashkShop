{% extends 'base.html' %}
{% block title %}Cadastrar — Loja{% endblock %}

{% block extra_css %}
<style>
    .auth-wrap {
        min-height: calc(100vh - 160px);
        display: flex; align-items: center; justify-content: center;
        padding: 2rem 0;
    }
    .auth-box {
        width: 100%; max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2.5rem;
    }
    .auth-logo { font-family: var(--display); font-size: 1.5rem; font-weight: 700; color: var(--accent); text-align: center; margin-bottom: 0.3rem; }
    .auth-subtitle { text-align: center; color: var(--muted); font-size: 0.875rem; margin-bottom: 2.25rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media(max-width:400px) { .row-2 { grid-template-columns: 1fr; } }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-box fade-up">
        <div class="auth-logo">◆ LOJA</div>
        <p class="auth-subtitle">Crie sua conta gratuita</p>

        <form method="POST">
            <div class="form-field">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required autofocus>
            </div>
            <div class="form-field">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
            <div class="row-2">
                <div class="form-field">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Mín. 6 chars" required minlength="6">
                </div>
                <div class="form-field">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                </div>
            </div>
            <button type="submit" class="btn btn-gold btn-full" style="margin-top:0.5rem">
                Criar conta
            </button>
        </form>

        <div class="auth-footer">
            Já tem conta? <a href="{{ url_for('login') }}">Entrar</a>
        </div>
    </div>
</div>
{% endblock %}
